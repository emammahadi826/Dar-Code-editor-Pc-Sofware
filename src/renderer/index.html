<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dar Studio</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0d0d0d; color: #ccc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        transition: opacity 0.3s ease;
        overflow: hidden;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash.hidden { display: none; }
      .splash-inner {
        display: flex; flex-direction: column; align-items: center;
        position: relative;
      }
      #splash-canvas {
        width: 65vw; max-width: 800px;
        aspect-ratio: 1 / 1;
        margin-bottom: 16px;
      }
      .splash-content {
        position: relative;
        display: flex; flex-direction: column; align-items: center;
        z-index: 1;
      }
      #splash-title { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 4px; letter-spacing: 0.5px; }
      #splash-sub { font-size: 13px; color: #888; margin-bottom: 28px; min-height: 1.2em; }
      #splash-dots { display: inline-block; min-width: 24px; text-align: left; }
      #splash-bar-track {
        width: 220px; height: 3px; background: #222; border-radius: 2px; overflow: hidden;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
      }
      #splash-bar-fill {
        width: 100%; height: 100%; background: linear-gradient(90deg, #007acc, #4fc3f7);
        border-radius: 2px;
        animation: splash-load 2.5s ease-in-out;
        transform-origin: left;
      }
      #splash-footer {
        position: absolute; bottom: 24px; text-align: center;
      }
      #splash-footer::before {
        content: ''; display: block; width: 60px; height: 1px;
        background: #333; margin: 0 auto 8px;
      }
      #splash-footer-text { font-size: 12px; color: #999; letter-spacing: 1px; }
      #splash-footer-text span { color: #007acc; }
      @keyframes splash-load {
        0% { transform: scaleX(0.02); }
        40% { transform: scaleX(0.6); }
        80% { transform: scaleX(0.3); }
        100% { transform: scaleX(1); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-inner">
        <canvas id="splash-canvas"></canvas>
        <div class="splash-content">
          <div id="splash-title">Dar Studio</div>
          <div id="splash-sub"><span id="splash-msg">Starting</span><span id="splash-dots">...</span></div>
          <div id="splash-bar-track">
            <div id="splash-bar-fill"></div>
          </div>
        </div>
      </div>
      <div id="splash-footer">
        <div id="splash-footer-text">Made with <span>&#9829;</span> by Mahadi</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
