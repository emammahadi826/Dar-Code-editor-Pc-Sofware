appId: com.darstudio.app
productName: Dar Studio
copyright: Copyright © 2026

win:
  target:
    - nsis
    - portable
  icon: Icon/icon.ico

nsis:
  artifactName: DarStudio-Setup-${version}.exe
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Dar Studio
  installerIcon: Icon/icon.ico
  uninstallerIcon: Icon/icon.ico
  installerHeader: resources/installer-header.bmp
  installerSidebar: resources/installer-sidebar.bmp

portable:
  artifactName: DarStudio-Portable-${version}.exe

directories:
  output: dist-electron
  buildResources: resources
